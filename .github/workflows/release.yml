name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import Code-Signing Certificate
        uses: Apple-Actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Resolve Swift packages
        run: xcodebuild -project MacInputStats.xcodeproj -scheme MacInputStats -resolvePackageDependencies

      - name: Archive Release
        run: >
          xcodebuild
          -project MacInputStats.xcodeproj
          -scheme MacInputStats
          -configuration Release
          -archivePath $RUNNER_TEMP/MacInputStats.xcarchive
          -derivedDataPath build/
          archive

      - name: Codesign app
        run: |
          APP_PATH="$RUNNER_TEMP/MacInputStats.xcarchive/Products/Applications/Activity Bar.app"
          codesign --deep --force --options runtime --timestamp \
            --sign "Developer ID Application: Suveen Ellawela (Z98F8W9LD3)" "$APP_PATH"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="$RUNNER_TEMP/MacInputStats.xcarchive/Products/Applications/Activity Bar.app"
          ditto -c -k --keepParent "$APP_PATH" $RUNNER_TEMP/ActivityBar-notarize.zip
          xcrun notarytool submit $RUNNER_TEMP/ActivityBar-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 20m
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        run: |
          brew install create-dmg
          APP_PATH="$RUNNER_TEMP/MacInputStats.xcarchive/Products/Applications/Activity Bar.app"
          mkdir -p $RUNNER_TEMP/dmg-source
          cp -R "$APP_PATH" $RUNNER_TEMP/dmg-source/
          create-dmg \
            --volname "Activity Bar" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Activity Bar.app" 150 185 \
            --app-drop-link 450 185 \
            ActivityBar.dmg \
            $RUNNER_TEMP/dmg-source/

      - name: Sign and notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --timestamp \
            --sign "Developer ID Application: Suveen Ellawela (Z98F8W9LD3)" ActivityBar.dmg
          xcrun notarytool submit ActivityBar.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 20m
          xcrun stapler staple ActivityBar.dmg

      - name: Get version info
        run: |
          APP_PATH="$RUNNER_TEMP/MacInputStats.xcarchive/Products/Applications/Activity Bar.app"
          VERSION=$(defaults read "$APP_PATH/Contents/Info.plist" CFBundleShortVersionString)
          BUILD=$(defaults read "$APP_PATH/Contents/Info.plist" CFBundleVersion)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "APP_BUILD=$BUILD" >> $GITHUB_ENV
          echo "Version: $VERSION, Build: $BUILD"

      - name: Sparkle sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_TOOL=$(find build/SourcePackages/artifacts -name "sign_update" -type f | head -1)
          if [ -z "$SIGN_TOOL" ]; then
            SIGN_TOOL=$(find build/ -name "sign_update" -type f | head -1)
          fi
          echo "Using sign tool: $SIGN_TOOL"
          SIGNATURE=$("$SIGN_TOOL" ActivityBar.dmg --ed-key-file <(echo -n "$SPARKLE_PRIVATE_KEY") 2>&1)
          ED_SIG=$(echo "$SIGNATURE" | grep -o 'sparkle:edSignature="[^"]*"' | sed 's/sparkle:edSignature="//;s/"//')
          LENGTH=$(echo "$SIGNATURE" | grep -o 'length="[^"]*"' | sed 's/length="//;s/"//')
          echo "ED_SIGNATURE=$ED_SIG" >> $GITHUB_ENV
          echo "DMG_LENGTH=$LENGTH" >> $GITHUB_ENV

      - name: Update appcast.xml
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          cat > appcast.xml << APPCAST_EOF
          <?xml version="1.0" standalone="yes"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">
            <channel>
              <title>Activity Bar</title>
              <item>
                <title>Version ${APP_VERSION}</title>
                <sparkle:version>${APP_BUILD}</sparkle:version>
                <sparkle:shortVersionString>${APP_VERSION}</sparkle:shortVersionString>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="https://github.com/SuveenE/mac-input-stats/releases/download/${TAG_NAME}/ActivityBar.dmg"
                  length="${DMG_LENGTH}"
                  type="application/octet-stream"
                  sparkle:edSignature="${ED_SIGNATURE}"
                />
              </item>
            </channel>
          </rss>
          APPCAST_EOF
          sed -i '' 's/^          //' appcast.xml

      - name: Commit appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add appcast.xml
          git commit -m "Bump version to ${APP_VERSION} and update appcast" || echo "No changes to commit"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ActivityBar.dmg
          generate_release_notes: true
